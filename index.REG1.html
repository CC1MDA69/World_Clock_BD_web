<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen bg-slate-100 antialiased"
    style="font-family: 'Irish Grover', cursive;"
  >
    <main class="mx-auto flex min-h-screen items-center justify-center p-4 md:p-6">
      <section
        class="relative w-full max-w-4xl rounded-2xl bg-[#ececec] p-6 shadow-lg sm:p-8 lg:h-[700px] lg:w-[1200px] lg:max-w-none lg:p-12"
      >
        <p class="absolute left-8 top-6 text-xs font-semibold text-black lg:left-12 lg:top-10">
          Time
        </p>

        <div class="flex h-full items-center justify-center">
          <div class="w-full max-w-xs lg:max-w-sm">
            <h1 class="mb-8 text-center text-3xl text-slate-900 lg:mb-10 lg:text-4xl">
              Registration
            </h1>

            <div class="mb-5 flex flex-col items-center">
              <div
                class="flex h-20 w-20 items-center justify-center rounded-full bg-slate-200 ring-2 ring-white"
                aria-hidden="true"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-10 w-10 text-slate-700"
                >
                  <path
                    d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2.25c-3.67 0-6.75 2.35-6.75 5.25a.75.75 0 0 0 .75.75h12a.75.75 0 0 0 .75-.75c0-2.9-3.08-5.25-6.75-5.25Z"
                  />
                </svg>
              </div>
              <p class="mt-3 text-center text-sm text-slate-800">Macan_Hiylan</p>
            </div>

            <div class="space-y-3">
              <button
                type="button"
                class="h-10 w-full rounded-full bg-black text-sm font-semibold text-white transition hover:bg-slate-800"
              >
                Open
              </button>
              <button
                type="button"
                class="h-10 w-full rounded-full bg-black text-sm font-semibold text-white transition hover:bg-slate-800"
              >
                Назад
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
