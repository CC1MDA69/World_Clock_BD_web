<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen bg-slate-100 antialiased"
    style="font-family: 'Irish Grover', cursive;"
  >
    <main class="mx-auto flex min-h-screen items-center justify-center p-4 md:p-6">
      <section
        class="relative w-full max-w-4xl rounded-2xl bg-[#ececec] p-6 shadow-lg sm:p-8 lg:h-[700px] lg:w-[1200px] lg:max-w-none lg:p-12"
      >
        <p class="absolute left-8 top-6 text-xs font-semibold text-black lg:left-12 lg:top-10">
          Time
        </p>

        <div class="flex h-full items-center justify-center">
          <div class="w-full max-w-xs lg:max-w-sm">
            <h1 class="mb-8 text-center text-3xl text-slate-900 lg:mb-10 lg:text-4xl">
              Registration
            </h1>

            <form class="space-y-4 lg:space-y-5">
              <div class="relative">
                <span
                  class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-slate-400 lg:left-5"
                  aria-hidden="true"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    class="h-4 w-4 lg:h-5 lg:w-5"
                  >
                    <path
                      d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2.25c-3.67 0-6.75 2.35-6.75 5.25a.75.75 0 0 0 .75.75h12a.75.75 0 0 0 .75-.75c0-2.9-3.08-5.25-6.75-5.25Z"
                    />
                  </svg>
                </span>
                <input
                  type="text"
                  name="login"
                  placeholder="Login"
                  class="h-11 w-full rounded-full border border-slate-200 bg-white pl-11 pr-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-300/50 lg:h-12 lg:pl-14 lg:pr-5 lg:text-base"
                />
              </div>

              <div class="relative">
                <span
                  class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-slate-400 lg:left-5"
                  aria-hidden="true"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    class="h-4 w-4 lg:h-5 lg:w-5"
                  >
                    <path
                      d="M4.5 6A2.25 2.25 0 0 0 2.25 8.25v7.5A2.25 2.25 0 0 0 4.5 18h15a2.25 2.25 0 0 0 2.25-2.25v-7.5A2.25 2.25 0 0 0 19.5 6h-15Zm.96 1.5h13.08L12 11.83 5.46 7.5Z"
                    />
                  </svg>
                </span>
                <input
                  type="email"
                  name="email"
                  placeholder="E-mail"
                  class="h-11 w-full rounded-full border border-slate-200 bg-white pl-11 pr-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-300/50 lg:h-12 lg:pl-14 lg:pr-5 lg:text-base"
                />
              </div>

              <div class="relative">
                <span
                  class="pointer-events-none absolute inset-y-0 left-4 flex items-center text-slate-400 lg:left-5"
                  aria-hidden="true"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 24 24"
                    fill="currentColor"
                    class="h-4 w-4 lg:h-5 lg:w-5"
                  >
                    <path
                      d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25V9h-.375A2.625 2.625 0 0 0 3.75 11.625v7.125a2.625 2.625 0 0 0 2.625 2.625h11.25a2.625 2.625 0 0 0 2.625-2.625v-7.125A2.625 2.625 0 0 0 17.625 9H17.25V6.75A5.25 5.25 0 0 0 12 1.5Zm-3.75 7.5V6.75a3.75 3.75 0 1 1 7.5 0V9h-7.5Z"
                    />
                  </svg>
                </span>
                <input
                  type="password"
                  name="password"
                  placeholder="Password"
                  class="h-11 w-full rounded-full border border-slate-200 bg-white pl-11 pr-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-300/50 lg:h-12 lg:pl-14 lg:pr-5 lg:text-base"
                />
              </div>

              <button
                type="submit"
                class="mt-7 h-11 w-full rounded-full bg-black text-sm font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-600 focus:ring-offset-2 lg:mt-9 lg:h-12 lg:text-base"
              >
                Open
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
