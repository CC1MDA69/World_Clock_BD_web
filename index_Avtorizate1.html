<!doctype html>
<html lang="ru">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body
    class="min-h-screen bg-slate-100 antialiased"
    style="font-family: 'Irish Grover', cursive;"
  >
    <main class="mx-auto flex min-h-screen items-center justify-center p-4 md:p-6">
      <section
        class="w-full max-w-4xl rounded-2xl bg-[#ececec] p-6 shadow-lg sm:p-8 lg:h-[700px] lg:w-[1200px] lg:max-w-none lg:p-12"
      >
        <div class="grid h-full items-center gap-8 md:grid-cols-2 lg:gap-12">
          <div class="flex justify-center">
            <div class="relative">
              <div
                class="h-[280px] w-[170px] rounded-[34px] border-2 border-sky-400 bg-white/40 lg:h-[430px] lg:w-[255px] lg:rounded-[50px]"
              ></div>
            </div>
          </div>

          <div class="flex h-full items-center justify-center">
            <div class="w-full max-w-sm lg:max-w-md">
            <h1 class="mb-9 text-center text-3xl font-semibold text-slate-900 lg:mb-12 lg:text-4xl">
              Authentification
            </h1>

            <form class="space-y-5 lg:space-y-6">
              <div class="relative">
                <input
                  type="text"
                  name="login"
                  placeholder="Login"
                  class="h-11 w-full rounded-full border border-slate-200 bg-white px-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-300/50 lg:h-12 lg:px-5 lg:text-base"
                />
              </div>

              <div class="relative">
                <input
                  type="password"
                  name="password"
                  placeholder="Password"
                  class="h-11 w-full rounded-full border border-slate-200 bg-white px-4 text-sm text-slate-900 placeholder:text-slate-400 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-300/50 lg:h-12 lg:px-5 lg:text-base"
                />
              </div>

              <button
                type="submit"
                class="mt-4 h-11 w-full rounded-full bg-black text-sm font-semibold text-white transition hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-600 focus:ring-offset-2 lg:mt-5 lg:h-12 lg:text-base"
              >
                Open
              </button>
            </form>

            <a
              href="#"
              class="mt-6 block text-center text-sm text-slate-700 underline-offset-2 transition hover:text-slate-900 hover:underline lg:mt-8 lg:text-base"
            >
              Registration
            </a>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
